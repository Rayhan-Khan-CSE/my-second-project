<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration Form 2</title>
</head>
<body>
    <h1 align="center">Conference <br>Registration Form</h1>
    <form align="center">
       <table align="center" border="1" cellpadding="10">
    <tr>
        <td><label>First Name</label></td>
        <td><input type="text"></td>
    </tr>

    <tr>
        <td><label>Last Name</label></td>
        <td><input type="text"></td>
    </tr>
    <tr>
        <td><label>Email</label></td>
        <td><input type="email"></td>
    </tr>
    <tr>
        <td><label>Organization</label></td>
        <td><input type="text"></td>
    </tr>
     <tr>
        <td><label>Event Type</label></td>
        <td>
            <select>
                <option>Workshop</option>
                 <option>Seminar</option>
                  <option>Conference</option>
                   <option>Training</option>
            </select>
        </td>
    </tr>
    <tr>
         <td><label>Meal Preference</label></td>
         <td>
            <input type="radio">Vegetarian
            <input type="radio">Non-Vegetarian
         </td>
    </tr>
    <tr>
         <td><label>Additional Notes</label></td>
         <td> <textarea rows="4" cols="25"></textarea></td>
    </tr>
    <tr>
        <td colspan="2" align="center">
            <input type="submit" value="Submit Registration">
             <input type="reset" value="Reset Form">
        </td>
    </tr>
    </table>
    </form>
</body>
</html>
